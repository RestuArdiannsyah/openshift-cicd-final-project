apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-and-test
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine
      script: |
        rm -rf $(workspaces.source.path)/*
    - name: nose-test
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install nose
        nosetests